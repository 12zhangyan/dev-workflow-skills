name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  board:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 看板同步与语法校验
        run: bash scripts/check-board-sync.sh
      - name: 交互协议引用校验
        run: node scripts/check-interaction-policy-sync.js
      - name: evals 结构校验
        run: node scripts/check-evals.js
