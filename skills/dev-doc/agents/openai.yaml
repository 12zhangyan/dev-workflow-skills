interface:
  display_name: "Dev Doc"
  short_description: "显式需要先评审方案时生成可执行开发文档"
  default_prompt: "Use dev-doc only when the user explicitly asks for a development/implementation plan or when unresolved contract, database, permission, state, transaction, or cross-module decisions require a reviewable Plan Gate before coding. Do not invoke it for a direct implementation request whose scope and acceptance criteria are already clear. The core artifact is the md plan; publish or upgrade the HTML board only when the user explicitly requests it or an applicable project rule requires it. Select Compact for an explicitly requested small same-module backward-compatible plan, and prefer IncrementalRevision when prior dev-docs are supplied. Route bug root-cause records to bug-fix, tester-facing flows to biz-flow, read-only code maps/call-chain/compatibility analysis with no plan output to code-reading, multi-agent review packages or fix handoffs to review-fix, implementation review to review-check, and accepted findings repair to review-repair."

policy:
  allow_implicit_invocation: true
