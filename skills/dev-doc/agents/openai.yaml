interface:
  display_name: "Dev Doc"
  short_description: "编码前生成有证据、可执行的改造方案并登记看板"
  default_prompt: "Use dev-doc before implementation to turn a new feature, front-end/back-end change, API signature change, refactor, performance task, or configuration change into an evidence-backed executable plan and board entry. Route bug root-cause records to bug-fix and tester-facing business flows to biz-flow; route review-task/fix-handoff creation to review-fix, read-only implementation review to review-check, and direct findings repair to review-repair. Infer from existing code/docs first, ask only blocking questions through capabilities actually available in the current host, and stop without writing artifacts when a non-interactive run has a high-risk blocker. Distinguish plan output from implementation evidence. If APIs are added or signatures change, generate the standalone OpenAPI artifact and index."

policy:
  allow_implicit_invocation: true
