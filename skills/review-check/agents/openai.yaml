interface:
  display_name: "Review Check"
  short_description: "按统一清单执行只读代码审查"
  default_prompt: "Use review-check skill to perform a read-only code review from a review task, dev-doc, patch, or diff. Route direct repair from existing findings to review-repair, same-agent review-and-fix closure to review-loop, and review-task generation or multi-reviewer aggregation to review-fix. State whether reviewing a plan or implementation code. Check whether tests call and assert the intended target logic, not just setup or mocks. Return findings, a no-evidence issue verdict, or an insufficient-material verdict; do not guess or claim code is clean without implementation evidence."

policy:
  allow_implicit_invocation: true
