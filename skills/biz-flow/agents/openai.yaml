interface:
  display_name: "Biz Flow"
  short_description: "生成面向测试和产品的业务流、状态与数据变动方案"
  default_prompt: "Use biz-flow skill to turn APIs or features into tester-facing business flow documentation. Infer entries from code/docs first, ask only blocking questions, and surface logic conflicts or missing closure evidence instead of guessing. Mark missing entries, terminal states, callbacks, fields, and branches as pending instead of inventing a closed flow."

policy:
  allow_implicit_invocation: true
