interface:
  display_name: "Review Loop"
  short_description: "单 AI 一键完成审查、修复、验证与复审"
  default_prompt: "Use review-loop to orchestrate a single-agent review-fix evidence package, review-check findings pass, review-repair implementation, targeted verification, and a second review of the latest diff. Before VCS add, declare VcsAddPolicy: use host-required only when an applicable repository rule explicitly requires new business files to be added; otherwise use user-authorize-only. Always show the exact file list first, explain policy conflicts before acting, and never extend add authority to commit or push."

policy:
  allow_implicit_invocation: true
